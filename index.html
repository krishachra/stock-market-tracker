<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Market Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📈 Stock Market Tracker</h1>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Enter stock symbol (e.g., AAPL)">
        <button id="searchBtn">Search</button>
    </div>

    <div class="controls">
        <button id="sortLow">Sort Price ↑</button>
        <button id="sortHigh">Sort Price ↓</button>
        <button id="filterHigh">Price > 100</button>
    </div>

    <button id="themeToggle">Toggle Theme</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
